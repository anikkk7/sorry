<!DOCTYPE html>
<html>
<head>
<title>pleaseeeeee bhai  Sorrrry</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:"Segoe UI";
overflow:hidden;

background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffd1ff,#a1c4fd);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:white;
font-size:48px;
text-shadow:0 0 15px white;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px white;}
}

#text{
width:70%;
text-align:center;
font-size:20px;
color:white;
min-height:100px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:15px;
}

#yes{
background:#2ecc71;
color:white;
}

#no{
background:#e74c3c;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.bigheart{
font-size:80px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="bigheart">❤️</div>

<h1>plz bhai maaf krde  Maaf Kar Do 😔</h1>

<div id="text"></div>

<button id="yes" onclick="forgive()">Haan, Maaf Kiya ❤️</button>
<button id="no" onmouseover="move()">Nahi 😒</button>

<script>

const message =
"Hey ADITI... \n\nSach me mujhe bahut bura lag raha hai. \
Main bas mazaak kr raha tha  aur wo bs sarcasm  tha, lekin mera intention kabhi bhi tereko  hurt karna nahi tha. teko pata hai na hum esa hai  \
\n\n hum toh bus mazak kar rahe the bhaiiiii ......plz maaaf krdeee next time se km mazak karunga . \
\n\nAgar meri baaton se tumhe bura laga ho toh dil se sorry. \
\n\nPlease mujhe maaf kar do... 🙏❤️";

let i=0;

function typing(){
if(i<message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();

function move(){
let x=Math.random()*window.innerWidth*0.8;
let y=Math.random()*window.innerHeight*0.8;

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}

function forgive(){

document.body.innerHTML="<h1>dhanyawadddd hehehehehe ❤️</h1><h2>Ab main pakka itna mazak nhi karunga 😊</h2>";

for(let i=0;i<150;i++){

let conf=document.createElement("div");

conf.innerHTML="🎉";

conf.style.position="absolute";

conf.style.left=Math.random()*100+"vw";

conf.style.top=Math.random()*100+"vh";

conf.style.fontSize="30px";

document.body.appendChild(conf);

}

}

function hearts(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

}

setInterval(hearts,300);

</script>

</body>
</html>
